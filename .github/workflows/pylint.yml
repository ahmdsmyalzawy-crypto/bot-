import sqlite3
import base64
import hashlib
import urllib.parse
import qrcode
import io
import re
from datetime import datetime

from telegram import Update, InlineKeyboardButton, InlineKeyboardMarkup
from telegram.ext import Application, CommandHandler, CallbackQueryHandler, MessageHandler, ContextTypes, filters

TOKEN = "8991135489:AAGQtzaKtT91_RYLXUvCHNzw6qFruP2sveg"

# ================= DATABASE =================
conn = sqlite3.connect("pro_saas.db", check_same_thread=False)
cur = conn.cursor()

cur.execute("""
CREATE TABLE IF NOT EXISTS users (
    id INTEGER PRIMARY KEY,
    usage INTEGER DEFAULT 0
)
""")

cur.execute("""
CREATE TABLE IF NOT EXISTS logs (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    uid INTEGER,
    input TEXT,
    output TEXT,
    type TEXT,
    time TEXT
)
""")

conn.commit()

user_mode = {}

# ================= MENU =================
def menu():
    return InlineKeyboardMarkup([
        [InlineKeyboardButton("🤖 AUTO SMART", callback_data="auto")],
        [InlineKeyboardButton("🔐 Encode", callback_data="b64")],
        [InlineKeyboardButton("🔓 Decode", callback_data="b64d")],
        [InlineKeyboardButton("🔢 Hex", callback_data="hex")],
        [InlineKeyboardButton("🔑 SHA256", callback_data="sha")],
        [InlineKeyboardButton("📷 QR", callback_data="qr")]
    ])

# ================= START =================
async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):
    u = update.effective_user
    cur.execute("INSERT OR IGNORE INTO users (id) VALUES (?)", (u.id,))
    conn.commit()

    await update.message.reply_text(
        "🚀 Smart Pro SaaS Bot جاهز\nاختر وضعك:",
        reply_markup=menu()
    )

# ================= HELPERS =================
def is_base64(text):
    return bool(re.fullmatch(r'[A-Za-z0-9+/=]+', text)) and len(text) % 4 == 0

def detect_type(text):
    if is_base64(text):
        return "base64"
    elif text.isdigit():
        return "number"
    elif len(text) > 25:
        return "long_text"
    else:
        return "text"

# ================= BUTTON =================
async def button(update: Update, context: ContextTypes.DEFAULT_TYPE):
    q = update.callback_query
    await q.answer()
    user_mode[q.from_user.id] = q.data
    await q.message.reply_text("✍️ أرسل النص الآن")

# ================= CORE ENGINE =================
async def handle(update: Update, context: ContextTypes.DEFAULT_TYPE):
    uid = update.message.from_user.id
    text = update.message.text
    mode = user_mode.get(uid, "auto")

    # usage counter
    cur.execute("UPDATE users SET usage = usage + 1 WHERE id=?", (uid,))
    conn.commit()

    try:
        result = ""
        detected = detect_type(text)

        # ================= AUTO SMART =================
        if mode == "auto":

            if detected == "base64":
                try:
                    result = f"🔓 تم فك Base64:\n{base64.b64decode(text).decode()}"
                except:
                    result = f"🔐 تم تشفير النص:\n{base64.b64encode(text.encode()).decode()}"

            elif detected == "number":
                result = f"🔑 SHA256:\n{hashlib.sha256(text.encode()).hexdigest()}"

            elif detected == "long_text":
                result = f"🔐 Base64:\n{base64.b64encode(text.encode()).decode()}"

            else:
                result = f"🌐 URL Encode:\n{urllib.parse.quote(text)}"

        # ================= MANUAL =================
        elif mode == "b64":
            result = base64.b64encode(text.encode()).decode()

        elif mode == "b64d":
            try:
                result = base64.b64decode(text.encode()).decode()
            except:
                result = "❌ Base64 غير صحيح"

        elif mode == "hex":
            result = text.encode().hex()

        elif mode == "sha":
            result = hashlib.sha256(text.encode()).hexdigest()

        elif mode == "qr":
            img = qrcode.make(text)
            bio = io.BytesIO()
            img.save(bio, format="PNG")
            bio.seek(0)
            await update.message.reply_photo(photo=bio)
            return

        # ================= LOG =================
        cur.execute("""
            INSERT INTO logs (uid, input, output, type, time)
            VALUES (?,?,?,?,?)
        """, (uid, text, str(result), mode, datetime.now().isoformat()))
        conn.commit()

        # ================= RESPONSE =================
        await update.message.reply_text(f"✅ النتيجة:\n{result}")

    except Exception as e:
        await update.message.reply_text("⚠️ حدث خطأ، حاول مرة ثانية")

# ================= RUN =================
app = Application.builder().token(TOKEN).build()

app.add_handler(CommandHandler("start", start))
app.add_handler(CallbackQueryHandler(button))
app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle))

app.run_polling()
